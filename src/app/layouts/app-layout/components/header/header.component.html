<header class="header">
    <div class="header__left">
        <button
            tuiIconButton
            class="header__menu-button"
            appearance="flat"
            size="m"
            iconStart="@tui.arrow-left"
            [tuiSkeleton]="skeleton"
            (click)="goBack()"
        ></button>

        <div class="header__title-block">
            <h1 class="header__title" [tuiSkeleton]="skeleton">AstushaAPP</h1>

            <tui-breadcrumbs
                class="header__breadcrumbs"
                [tuiSkeleton]="skeleton"
            >
                <app-breadcrumbs />
            </tui-breadcrumbs>
        </div>
    </div>

    <div class="header__right">
        <tui-textfield
            class="header__search"
            iconStart="@tui.search"
            [tuiSkeleton]="skeleton"
        >
            <input
                tuiInput
                type="text"
                placeholder="Поиск задач, проектов, людей..."
            />
        </tui-textfield>

        <button
            tuiButton
            class="header__create-button"
            size="m"
            iconStart="@tui.plus"
            [tuiSkeleton]="skeleton"
            [attr.aria-expanded]="openCreateMenu()"
            [tuiDropdown]="createMenuDropdown"
            [tuiDropdownManual]="openCreateMenu()"
            (tuiDropdownOpenChange)="openCreateMenu.set($event)"
            (click)="toggleCreateMenu($event)"
        >
            Создать
        </button>

        <button
            tuiIconButton
            class="header__icon-button"
            appearance="flat"
            size="m"
            iconStart="@tui.bell"
            [tuiSkeleton]="skeleton"
            tuiHint="В разработке"
        >
        </button>

        <button
            tuiIconButton
            class="header__icon-button"
            appearance="flat"
            size="m"
            iconStart="@tui.circle-question-mark"
            [tuiSkeleton]="skeleton"
            tuiHint="Помощь"
            (click)="openHelpDialog()"
        >
        </button>

        @let profile = profile$ | async;

        <button
            tuiButton
            class="header__profile-button"
            appearance="flat"
            size="m"
            iconEnd="@tui.chevron-down"
            [tuiSkeleton]="skeleton || !profile"
            [attr.aria-expanded]="openActionsMenu()"
            [tuiDropdown]="userMenuDropdown"
            [tuiDropdownManual]="openActionsMenu()"
            (tuiDropdownOpenChange)="openActionsMenu.set($event)"
            (click)="toggleUserMenu($event)"
        >
            @if (profile) {
                <span class="header__avatar">
                    @if (profile.avatarUrl) {
                        <img
                            class="header__avatar-img"
                            [src]="profile.avatarUrl"
                            alt="Аватар пользователя"
                        />
                    } @else {
                        <span
                            tuiAvatar="@tui.user"
                            class="header__avatar-fallback"
                        ></span>
                    }
                </span>

                <span class="header__profile-name">
                    {{
                        (
                            (profile.firstName ?? '') +
                            ' ' +
                            (profile.lastName ?? '')
                        ).trim() || profile.login
                    }}
                </span>
            } @else {
                <span class="header__avatar">
                    <span
                        tuiAvatar="@tui.user"
                        class="header__avatar-fallback"
                    ></span>
                </span>

                <span class="header__profile-name">Загрузка</span>
            }
        </button>

        <ng-template #userMenuDropdown>
            <tui-data-list>
                @for (action of userMenuActions; track action.value) {
                    <button tuiOption (click)="onUserMenuAction(action.value)">
                        {{ action.title }}
                    </button>
                }
            </tui-data-list>
        </ng-template>

        <ng-template #createMenuDropdown>
            <tui-data-list>
                @for (action of createMenuActions; track action.value) {
                    <button
                        tuiOption
                        (click)="onCreateMenuAction(action.value)"
                    >
                        {{ action.title }}
                    </button>
                }
            </tui-data-list>
        </ng-template>
    </div>
</header>
