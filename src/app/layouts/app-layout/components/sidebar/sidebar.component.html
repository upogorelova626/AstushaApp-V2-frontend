<div class="sidebar">
    <div class="sidebar__header">
        <div class="sidebar__logo">
            <div class="sidebar__logo-icon">
                <tui-icon icon="@tui.cat" />
            </div>

            <span class="sidebar__logo-text">AstushaApp</span>
        </div>
    </div>

    <nav class="sidebar__nav">
        @for (button of sidebarButtons; track $index) {
            <a
                tuiButton
                class="sidebar__nav-item"
                [routerLink]="button.link"
                routerLinkActive="sidebar__nav-item_active"
                appearance="flat"
                size="m"
            >
                <tui-icon class="sidebar__nav-icon" [icon]="button.icon" />
                <span class="sidebar__nav-text">{{ button.text }}</span>
            </a>
        }
    </nav>

    <div class="sidebar__recent-projects">
        <div class="sidebar__section-header">
            <span class="sidebar__section-title">Недавние проекты</span>

            <a
                tuiIconButton
                class="sidebar__section-create"
                routerLink="/dashboard/projects"
                appearance="flat"
                size="xs"
                iconStart="@tui.plus"
                tuiHint="Создать проект"
                tuiHintDirection="top-end"
            ></a>
        </div>

        <div class="sidebar__recent-list" [tuiSkeleton]="isLoading()">
            @if (projects().length > 0) {
                @for (project of projects(); track project.id) {
                    <a
                        tuiButton
                        class="sidebar__recent-item"
                        size="m"
                        appearance="secondary"
                        iconStart="@tui.folder"
                        [routerLink]="['/dashboard/projects', project.id]"
                    >
                        <span class="sidebar__recent-info">
                            <span
                                class="sidebar__recent-title"
                                [title]="project.title"
                                s
                            >
                                {{ project.title }}
                            </span>

                            <span class="sidebar__recent-status">
                                {{ project.status }}
                            </span>
                        </span>
                    </a>
                }
            } @else {
                <div class="sidebar__recent-empty">
                    <tui-icon
                        class="sidebar__recent-empty-icon"
                        icon="@tui.folder-plus"
                    />

                    <span class="sidebar__recent-empty-text">
                        Проектов пока нет
                    </span>
                </div>
            }
        </div>
    </div>

    <div class="sidebar__footer">
        @if (profile$ | async; as profile) {
            <button
                tuiButton
                class="sidebar__profile"
                appearance="flat"
                size="m"
            >
                <div class="sidebar__profile-avatar-wrapper">
                    @if (profile.avatarUrl) {
                        <img
                            class="sidebar__profile-avatar-img"
                            [src]="profile.avatarUrl"
                            alt="Аватар пользователя"
                        />
                    } @else {
                        <div
                            tuiAvatar="@tui.user"
                            class="sidebar__profile-avatar"
                        ></div>
                    }

                    <span class="sidebar__profile-avatar-status"></span>
                </div>

                <div class="sidebar__profile-info">
                    <span
                        class="sidebar__profile-name"
                        [title]="
                            (
                                (profile.firstName ?? '') +
                                ' ' +
                                (profile.lastName ?? '')
                            ).trim() || profile.login
                        "
                    >
                        {{
                            (
                                (profile.firstName ?? '') +
                                ' ' +
                                (profile.lastName ?? '')
                            ).trim() || profile.login
                        }}
                    </span>

                    <span class="sidebar__profile-position">
                        {{ profile.position || 'Пользователь' }}
                    </span>
                </div>

                <tui-icon
                    class="sidebar__profile-chevron"
                    icon="@tui.chevron-down"
                />
            </button>
        }
    </div>
</div>
