<div class="ai-chats-column">
    <header class="ai-chats-column__header">
        <div>
            <h2 class="ai-chats-column__title">Чаты</h2>
            <p class="ai-chats-column__description"> Диалоги с Astusha AI </p>
        </div>

        <button
            tuiButton
            type="button"
            size="s"
            appearance="flat"
            iconStart="@tui.pen-line"
            class="ai-chats-column__header-button"
        >
            Создать
        </button>
    </header>

    <main class="ai-chats-column__content">
        <tui-textfield class="ai-chats-column__search" iconStart="@tui.search">
            <label tuiLabel>Поиск чатов</label>
            <input tuiInput />
        </tui-textfield>

        <tui-tabs class="ai-chats-column__tabs">
            <button tuiTab type="button">Все</button>
            <button tuiTab type="button">Проекты</button>
            <button tuiTab type="button">Задачи</button>
        </tui-tabs>

        <div class="ai-chats-column__list">
            <button
                type="button"
                class="ai-chats-column__chat ai-chats-column__chat_active"
            >
                <div class="ai-chats-column__chat-icon">
                    <tui-icon icon="@tui.brain" />
                </div>

                <div class="ai-chats-column__chat-content">
                    <div class="ai-chats-column__chat-header">
                        <h3 class="ai-chats-column__chat-title">
                            Тёмная тема в приложении
                        </h3>

                        <time class="ai-chats-column__chat-time">11:24</time>
                    </div>

                    <p class="ai-chats-column__chat-message">
                        Как лучше реализовать переключение между светлой и
                        тёмной темой?
                    </p>
                </div>
            </button>
        </div>
    </main>

    <footer class="ai-chats-column__footer">
        <button
            tuiButton
            type="button"
            appearance="primary"
            iconStart="@tui.plus"
            class="ai-chats-column__create-button"
        >
            Новый чат
        </button>
    </footer>
</div>
