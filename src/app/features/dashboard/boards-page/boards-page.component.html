<div class="boards-page">
    <app-boards-toolbar
        [projects]="projects()"
        [selectedProjectMembers]="selectedProjectMembers()"
        [selectedProjectId]="selectedProjectId()"
        [selectedAssigneeId]="selectedAssigneeId()"
        [selectedPriority]="selectedPriority()"
        [isLoading]="isLoading()"
        [onlyMine]="onlyMine()"
        (projectSelected)="selectProject($event)"
        (assigneeSelected)="assigneeSelected($event)"
        (prioritySelected)="prioritySelected($event)"
        (onlyMineChanged)="onlyMineChanged($event)"
    />

    @if (boardStages().length > 0) {
        <div class="boards-page__board">
            @for (stage of boardStages(); track stage.id) {
                <app-board-column
                    class="boards-page__column"
                    [stage]="stage"
                    [tasks]="getFilteredTasks(stage.tasks)"
                    [connectedDropLists]="dropListIds()"
                    (taskDropped)="moveTask($event.event, $event.targetStageId)"
                />
            }
        </div>
    } @else {
        <div class="boards-page__empty">
            Выберите проект, чтобы открыть доску
        </div>
    }
</div>
