<div class="column">
    <header class="header">
        <div class="title-block">
            <h3 class="title">
                {{ stage().name }}
            </h3>

            <span class="count">
                {{ tasksCount() }}
            </span>
        </div>

        <button
            tuiIconButton
            class="add-button"
            type="button"
            appearance="flat"
            size="xs"
            iconStart="@tui.plus"
        ></button>
    </header>

    <main
        cdkDropList
        class="tasks"
        [id]="dropListId()"
        [cdkDropListData]="tasks()"
        [cdkDropListConnectedTo]="connectedDropLists()"
        (cdkDropListDropped)="drop($event)"
    >
        @for (task of tasks(); track task.id) {
            <app-board-task-card cdkDrag [cdkDragData]="task" [task]="task" />
        } @empty {
            <div class="empty">Нет задач</div>
        }
    </main>
</div>
