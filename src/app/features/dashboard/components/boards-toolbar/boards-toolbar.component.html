<div class="toolbar">
    <header class="header">
        <div class="title-block">
            <h1 class="title">Доски</h1>

            <p class="description">
                Выберите проект и управляйте задачами по этапам
            </p>
        </div>

        <button
            tuiButton
            class="create-button"
            type="button"
            size="m"
            iconStart="@tui.plus"
            [disabled]="!selectedProjectId() || isLoading()"
            [routerLink]="['/dashboard/projects', selectedProjectId(), 'tasks']"
        >
            Создать задачу
        </button>
    </header>

    <div class="controls">
        <label class="control project-control">
            <span class="label">Проект</span>

            <div class="select-wrapper">
                <tui-icon class="control-icon" icon="@tui.folder" />

                <select
                    class="select"
                    [value]="selectedProjectId() ?? ''"
                    [disabled]="isLoading()"
                    (change)="selectProject($event)"
                >
                    <option value="">Выберите проект</option>

                    @for (project of projects(); track project.id) {
                        <option [value]="project.id">
                            {{ project.title }}
                        </option>
                    }
                </select>

                <tui-icon class="chevron" icon="@tui.chevron-down" />
            </div>
        </label>

        <label class="control">
            <span class="label">Исполнитель</span>

            <div class="select-wrapper">
                <tui-icon class="control-icon" icon="@tui.user" />

                <select
                    class="select"
                    [value]="selectedAssigneeId() ?? ''"
                    [disabled]="!selectedProjectId() || isLoading()"
                    (change)="selectAssignee($event)"
                >
                    <option value="">Все исполнители</option>

                    @for (member of selectedProjectMembers(); track member.id) {
                        <option [value]="member.user.id">
                            {{ member.user.firstName || member.user.login }}
                            {{ member.user.lastName || '' }}
                        </option>
                    }
                </select>

                <tui-icon class="chevron" icon="@tui.chevron-down" />
            </div>
        </label>

        <label class="control">
            <span class="label">Приоритет</span>

            <div class="select-wrapper">
                <tui-icon class="control-icon" icon="@tui.flag" />

                <select
                    class="select"
                    [value]="selectedPriority() ?? ''"
                    [disabled]="!selectedProjectId() || isLoading()"
                    (change)="selectPriority($event)"
                >
                    <option value="">Все приоритеты</option>

                    @for (priority of taskPriorities; track priority.value) {
                        <option [value]="priority.value">
                            {{ priority.label }}
                        </option>
                    }
                </select>

                <tui-icon class="chevron" icon="@tui.chevron-down" />
            </div>
        </label>

        <label class="only-mine">
            <input
                tuiSwitch
                type="checkbox"
                [checked]="onlyMine()"
                [disabled]="!selectedProjectId() || isLoading()"
                (change)="onOnlyMineChange($event)"
            />

            <span class="only-mine-text">Только мои</span>
        </label>
    </div>
</div>
