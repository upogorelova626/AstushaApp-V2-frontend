<section class="boards-toolbar">
    <header class="boards-toolbar__header">
        <div class="boards-toolbar__title-block">
            <h1 class="boards-toolbar__title">Доски</h1>

            <p class="boards-toolbar__description">
                Выберите проект и управляйте задачами по этапам
            </p>
        </div>

        <button
            tuiButton
            type="button"
            size="m"
            iconStart="@tui.plus"
            class="boards-toolbar__create-button"
            [disabled]="!selectedProjectId() || isLoading()"
            [routerLink]="['/dashboard/projects', selectedProjectId(), 'tasks']"
        >
            Создать задачу
        </button>
    </header>

    <div class="boards-toolbar__controls">
        <label class="boards-toolbar__control boards-toolbar__control_project">
            <span class="boards-toolbar__label">Проект</span>

            <div class="boards-toolbar__select-wrapper">
                <tui-icon
                    class="boards-toolbar__control-icon"
                    icon="@tui.folder"
                />

                <select
                    class="boards-toolbar__select"
                    [value]="selectedProjectId() ?? ''"
                    [disabled]="isLoading()"
                    (change)="selectProject($event)"
                >
                    <option value="">Выберите проект</option>

                    @for (project of projects(); track project.id) {
                        <option [value]="project.id">
                            {{ project.title }}
                        </option>
                    }
                </select>

                <tui-icon
                    class="boards-toolbar__chevron"
                    icon="@tui.chevron-down"
                />
            </div>
        </label>

        <label class="boards-toolbar__control boards-toolbar__control_search">
            <span class="boards-toolbar__label">Поиск</span>

            <tui-textfield
                class="boards-toolbar__textfield"
                iconStart="@tui.search"
            >
                <input
                    tuiInput
                    type="text"
                    placeholder="Поиск по задачам"
                    [disabled]="!selectedProjectId() || isLoading()"
                />
            </tui-textfield>
        </label>

        <label class="boards-toolbar__control">
            <span class="boards-toolbar__label">Исполнитель</span>

            <tui-textfield
                class="boards-toolbar__textfield"
                iconStart="@tui.user"
            >
                <input
                    tuiInput
                    type="text"
                    placeholder="Поиск по исполнителю"
                    [disabled]="!selectedProjectId() || isLoading()"
                />
            </tui-textfield>
        </label>

        <label class="boards-toolbar__control">
            <span class="boards-toolbar__label">Приоритет</span>

            <tui-textfield
                class="boards-toolbar__textfield"
                iconStart="@tui.flag"
            >
                <input
                    tuiInput
                    type="text"
                    placeholder="Поиск по приоритету"
                    [disabled]="!selectedProjectId() || isLoading()"
                />
            </tui-textfield>
        </label>

        <label class="boards-toolbar__only-mine">
            <input
                tuiSwitch
                type="checkbox"
                [checked]="onlyMine()"
                [disabled]="!selectedProjectId() || isLoading()"
                (change)="onOnlyMineChange($event)"
            />

            <span class="boards-toolbar__only-mine-toggle"></span>

            <span class="boards-toolbar__only-mine-text">Только мои</span>
        </label>
    </div>
</section>
