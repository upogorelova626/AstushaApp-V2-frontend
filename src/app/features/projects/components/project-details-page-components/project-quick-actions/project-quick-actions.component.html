<div class="project-quick-actions">
    <header class="project-quick-actions__header">
        <tui-icon class="project-quick-actions__header-icon" icon="@tui.zap" />

        <h2 class="project-quick-actions__title"> Быстрые действия </h2>
    </header>

    <main class="project-quick-actions__list">
        <button
            tuiButton
            class="project-quick-actions__button"
            type="button"
            appearance="flat"
            [routerLink]="['/dashboard/projects', project()?.id, 'members']"
        >
            <tui-icon
                class="project-quick-actions__button-icon"
                icon="@tui.users"
            />

            <span class="project-quick-actions__button-content">
                <span class="project-quick-actions__button-title">
                    Команда проекта
                </span>

                <span class="project-quick-actions__button-description">
                    Посмотреть команду проекта
                </span>
            </span>

            <tui-icon
                class="project-quick-actions__button-arrow"
                icon="@tui.chevron-right"
            />
        </button>

        <button
            tuiButton
            class="project-quick-actions__button"
            type="button"
            appearance="flat"
            [routerLink]="['/dashboard/projects', project()?.id, 'tasks']"
        >
            <tui-icon
                class="project-quick-actions__button-icon"
                icon="@tui.list-todo"
            />

            <span class="project-quick-actions__button-content">
                <span class="project-quick-actions__button-title">
                    Перейти к задачам
                </span>

                <span class="project-quick-actions__button-description">
                    Открыть полный список задач
                </span>
            </span>

            <tui-icon
                class="project-quick-actions__button-arrow"
                icon="@tui.chevron-right"
            />
        </button>
        @if (canManageProject()) {
            <button
                tuiButton
                class="project-quick-actions__button"
                type="button"
                appearance="flat"
                [routerLink]="[
                    '/dashboard/projects',
                    project()?.id,
                    'settings'
                ]"
            >
                <tui-icon
                    class="project-quick-actions__button-icon"
                    icon="@tui.settings"
                />

                <span class="project-quick-actions__button-content">
                    <span class="project-quick-actions__button-title">
                        Настройки проекта
                    </span>

                    <span class="project-quick-actions__button-description">
                        Управление параметрами проекта
                    </span>
                </span>

                <tui-icon
                    class="project-quick-actions__button-arrow"
                    icon="@tui.chevron-right"
                />
            </button>
        }
    </main>
</div>
