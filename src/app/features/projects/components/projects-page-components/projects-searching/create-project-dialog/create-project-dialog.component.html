<form class="create-project-dialog" [formGroup]="form">
    <tui-textfield>
        <label tuiLabel>Добавьте название</label>

        <input tuiAutoFocus tuiInput formControlName="title" />
    </tui-textfield>

    <tui-error
        [formControl]="form.controls.title"
        [order]="['required', 'minlength', 'maxlength']"
    />

    <tui-textfield>
        <label tuiLabel>
            Добавьте короткий ключ проекта. Например: AST, CAT, MEW
        </label>

        <input tuiInput formControlName="key" />
    </tui-textfield>

    <tui-error
        [formControl]="form.controls.key"
        [order]="['required', 'minlength', 'maxlength', 'pattern']"
    />

    <tui-textfield>
        <label tuiLabel>Добавьте описание проекта</label>

        <input tuiInput formControlName="description" />
    </tui-textfield>

    <tui-error
        [formControl]="form.controls.description"
        [order]="['required', 'maxlength']"
    />

    <div
        class="create-project-dialog__dropdown"
        [tuiDropdown]="workflowDropdown"
        [tuiDropdownManual]="workflowDropdownOpen()"
    >
        <tui-textfield tuiChevron (click)="toggleWorkflowDropdown()">
            <label tuiLabel>Тип рабочего процесса</label>

            <input
                tuiInput
                readonly
                type="text"
                placeholder="Выберите тип рабочего процесса"
                formControlName="workflowTypeTitle"
            />
        </tui-textfield>
    </div>

    <ng-template #workflowDropdown>
        <tui-data-list>
            @for (type of workflowTypeOptions; track type.value) {
                <button
                    tuiOption
                    type="button"
                    (click)="selectWorkflowType(type)"
                >
                    <span tuiTitle>
                        {{ type.title }}

                        <span tuiSubtitle>
                            {{ type.description }}
                        </span>
                    </span>
                </button>
            }
        </tui-data-list>
    </ng-template>

    <tui-error
        [formControl]="form.controls.workflowTypeTitle"
        [order]="['required']"
    />

    <div
        class="create-project-dialog__dropdown"
        [tuiDropdown]="priorityDropdown"
        [tuiDropdownManual]="priorityDropdownOpen()"
    >
        <tui-textfield
            tuiChevron
            [tuiTextfieldCleaner]="false"
            (click)="togglePriorityDropdown()"
        >
            <label tuiLabel>Приоритет проекта</label>

            <input
                tuiInput
                readonly
                type="text"
                placeholder="Выберите приоритет проекта"
                formControlName="priorityTitle"
            />
        </tui-textfield>
    </div>

    <ng-template #priorityDropdown>
        <tui-data-list>
            @for (priority of priorityOptions; track priority.value) {
                <button
                    tuiOption
                    type="button"
                    (click)="selectPriority(priority)"
                >
                    <span tuiTitle>
                        {{ priority.title }}

                        <span tuiSubtitle>
                            {{ priority.description }}
                        </span>
                    </span>
                </button>
            }
        </tui-data-list>
    </ng-template>

    <tui-error
        [formControl]="form.controls.priorityTitle"
        [order]="['required']"
    />

    <tui-textfield>
        <label tuiLabel>Дата начала</label>

        <input tuiInputDate formControlName="startDate" />

        <tui-calendar *tuiDropdown />
    </tui-textfield>

    <tui-error
        [formControl]="form.controls.startDate"
        [order]="['required', 'notPastDateValidator']"
    />

    <tui-textfield>
        <label tuiLabel>Дедлайн</label>

        <input tuiInputDate tuiUnfinishedValidator formControlName="deadline" />

        <tui-calendar *tuiDropdown />
    </tui-textfield>

    <tui-error
        [formControl]="form.controls.deadline"
        [order]="['required', 'notPastDateValidator']"
    />

    <tui-error
        [error]="
            form.hasError('deadlineBeforeStartDate') &&
            form.controls.deadline.touched
                ? 'Дедлайн не может быть раньше даты старта'
                : null
        "
    />

    <footer class="create-project-dialog__footer">
        <button
            appearance="secondary"
            tuiButton
            type="button"
            (click)="context.$implicit.complete()"
        >
            Отмена
        </button>

        <button tuiButton type="button" (click)="createProject()">
            Создать
        </button>
    </footer>
</form>
