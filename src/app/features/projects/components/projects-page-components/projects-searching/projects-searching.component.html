<div class="projects-searching-wrapper">
    <div class="searching-and-sort">
        <tui-textfield
            class="projects-searching-wrapper__search"
            iconStart="@tui.search"
            tuiTextfieldSize="m"
        >
            <input
                FormControl="search"
                tuiInput
                type="text"
                placeholder="Поиск проектов..."
                [formControl]="search"
            />
        </tui-textfield>

        <button
            tuiButton
            class="projects-searching-wrapper__control"
            appearance="flat"
            size="m"
            iconEnd="@tui.chevron-down"
        >
            Статус: Все
        </button>
    </div>

    <button
        tuiButton
        class="projects-searching-wrapper__create-button"
        size="m"
        iconStart="@tui.plus"
        (click)="click()"
    >
        Создать проект
    </button>
</div>

<router-outlet />
