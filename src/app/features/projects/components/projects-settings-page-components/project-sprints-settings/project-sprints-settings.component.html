<div class="project-current-sprint-card">
    <header class="project-current-sprint-card__header">
        <div class="project-current-sprint-card__title-wrapper">
            <tui-icon
                class="project-current-sprint-card__title-icon"
                icon="@tui.repeat"
            />

            <h3 class="project-current-sprint-card__title"> Текущий спринт </h3>
        </div>

        <span class="project-current-sprint-card__status _active">
            Активен
        </span>
    </header>

    <div class="project-current-sprint-card__body">
        <div class="project-current-sprint-card__row">
            <span>Название</span>
            <b>Sprint #12 — Core Features</b>
        </div>

        <div class="project-current-sprint-card__row">
            <span>Период</span>
            <b>01.06.2026 — 14.06.2026</b>
        </div>

        <div class="project-current-sprint-card__row">
            <span>Задачи</span>
            <b>18 / 25</b>
        </div>

        <div class="project-current-sprint-card__progress">
            <div
                class="project-current-sprint-card__progress-bar"
                style="width: 72%"
            ></div>
        </div>
    </div>
</div>
