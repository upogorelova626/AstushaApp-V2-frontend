<section class="project-team-settings">
    <header class="project-team-settings__header">
        <div class="project-team-settings__title-wrapper">
            <div class="project-team-settings__icon">
                <tui-icon icon="@tui.users" />
            </div>

            <h2 class="project-team-settings__title">Команда проекта</h2>
        </div>

        <span class="project-team-settings__badge">Подключена</span>
    </header>

    <main class="project-team-settings__main">
        <div class="project-team-settings__team">
            <div class="project-team-settings__avatar">AC</div>

            <div class="project-team-settings__info">
                <h3 class="project-team-settings__team-name">Astusha Core</h3>

                <p class="project-team-settings__description">
                    Основная команда разработки проекта
                </p>

                <div class="project-team-settings__meta">
                    <span>8 участников</span>
                    <span>·</span>
                    <span>3 администратора</span>
                </div>
            </div>
        </div>

        <div class="project-team-settings__actions">
            <button
                tuiButton
                type="button"
                appearance="outline"
                size="m"
                iconStart="@tui.replace"
            >
                Изменить команду
            </button>

            <button
                tuiButton
                type="button"
                appearance="outline"
                size="m"
                iconStart="@tui.unlink"
            >
                Отвязать команду
            </button>
        </div>
    </main>
</section>
