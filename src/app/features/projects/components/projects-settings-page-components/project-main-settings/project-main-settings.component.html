<div class="project-main-settings">
    <header class="project-main-settings__header">
        <h2 class="project-main-settings__title">Основная информация</h2>

        <button
            tuiButton
            type="button"
            appearance="outline"
            size="s"
            iconStart="@tui.pencil"
            (click)="startEditing()"
        >
            Редактировать
        </button>
    </header>

    <form [formGroup]="form" class="project-main-settings__content">
        <label class="project-main-settings__field">
            <span class="project-main-settings__label">Название проекта</span>

            <tui-textfield tuiTextfieldSize="m">
                <input
                    tuiInput
                    type="text"
                    placeholder="Например, Astusha App"
                    formControlName="title"
                />
            </tui-textfield>
        </label>

        <tui-error
            [formControl]="form.controls.title"
            [order]="['required', 'maxlength', 'minlength']"
        />

        <label class="project-main-settings__field">
            <span class="project-main-settings__label">Описание</span>

            <tui-textfield tuiTextfieldSize="m">
                <textarea
                    tuiTextarea
                    placeholder="Кратко опишите цель проекта"
                    formControlName="description"
                ></textarea>
            </tui-textfield>
        </label>

        <tui-error
            [formControl]="form.controls.description"
            [order]="['required', 'maxlength']"
        />

        <label class="project-main-settings__field">
            <span class="project-main-settings__label">Тип workflow</span>

            <tui-textfield
                tuiTextfieldSize="m"
                iconStart="@tui.workflow"
                tuiChevron
            >
                <input
                    tuiInput
                    readonly
                    type="text"
                    placeholder="Выберите тип workflow"
                    formControlName="workflowTypeTitle"
                />

                <tui-data-list *tuiDropdown>
                    @for (type of workflowTypeOptions; track type.value) {
                        <button
                            tuiOption
                            type="button"
                            (click)="selectWorkflowType(type)"
                        >
                            <span tuiTitle>
                                {{ type.title }}

                                <span tuiSubtitle>
                                    {{ type.description }}
                                </span>
                            </span>
                        </button>
                    }
                </tui-data-list>
            </tui-textfield>
        </label>

        <tui-error
            [formControl]="form.controls.workflowTypeTitle"
            [order]="['required']"
        />

        <label class="project-main-settings__field">
            <span class="project-main-settings__label">Приоритет</span>

            <tui-textfield
                tuiTextfieldSize="m"
                iconStart="@tui.flag"
                tuiChevron
            >
                <input
                    tuiInput
                    readonly
                    type="text"
                    placeholder="Выберите приоритет"
                    formControlName="priorityTitle"
                />

                <tui-data-list *tuiDropdown>
                    @for (priority of priorityOptions; track priority.value) {
                        <button
                            tuiOption
                            type="button"
                            (click)="selectPriority(priority)"
                        >
                            <span tuiTitle>
                                {{ priority.title }}

                                <span tuiSubtitle>
                                    {{ priority.description }}
                                </span>
                            </span>
                        </button>
                    }
                </tui-data-list>
            </tui-textfield>
        </label>

        <tui-error
            [formControl]="form.controls.priorityTitle"
            [order]="['required']"
        />

        <label class="project-main-settings__field">
            <span class="project-main-settings__label">Дата старта</span>

            <tui-textfield tuiTextfieldSize="m" iconStart="@tui.calendar">
                <input
                    tuiInputDate
                    placeholder="Выберите дату"
                    formControlName="startDate"
                />

                <tui-calendar *tuiDropdown />
            </tui-textfield>
        </label>

        <tui-error
            [formControl]="form.controls.startDate"
            [order]="['required', 'pastDate']"
        />

        <label class="project-main-settings__field">
            <span class="project-main-settings__label">Дедлайн</span>

            <tui-textfield tuiTextfieldSize="m" iconStart="@tui.calendar">
                <input
                    tuiInputDate
                    placeholder="Выберите дату"
                    formControlName="deadline"
                />

                <tui-calendar *tuiDropdown />
            </tui-textfield>
        </label>

        <tui-error
            [formControl]="form.controls.deadline"
            [order]="['required', 'pastDate', 'deadlineBeforeStartDate']"
        />
    </form>

    @if (isEditing()) {
        <footer class="project-main-settings__footer">
            <button
                tuiButton
                type="button"
                appearance="primary"
                size="m"
                [disabled]="isSaving()"
                (click)="saveChanges()"
            >
                Сохранить изменения
            </button>

            <button
                tuiButton
                type="button"
                appearance="outline"
                size="m"
                [disabled]="isSaving()"
                (click)="cancelEditing()"
            >
                Отмена
            </button>
        </footer>
    }
</div>
