<div class="project-main-settings">
    <header class="project-main-settings__header">
        <h2 class="project-main-settings__title">Основная информация</h2>

        <button
            tuiButton
            type="button"
            appearance="outline"
            size="s"
            iconStart="@tui.pencil"
        >
            Редактировать
        </button>
    </header>

    <main class="project-main-settings__content">
        <label class="project-main-settings__field">
            <span class="project-main-settings__label">Название проекта</span>

            <tui-textfield tuiTextfieldSize="m">
                <input
                    tuiInput
                    type="text"
                    placeholder="Например, Astusha App"
                />
            </tui-textfield>
        </label>

        <label class="project-main-settings__field">
            <span class="project-main-settings__label">Описание</span>

            <tui-textfield tuiTextfieldSize="m">
                <textarea
                    tuiTextarea
                    placeholder="Кратко опишите цель проекта"
                ></textarea>
            </tui-textfield>
        </label>

        <label class="project-main-settings__field">
            <span class="project-main-settings__label">Приоритет</span>

            <button
                tuiButton
                tuiChevron
                class="project-main-settings__select"
                type="button"
                appearance="outline"
                size="m"
            >
                Высокий
            </button>
        </label>

        <label class="project-main-settings__field">
            <span class="project-main-settings__label">Тип процесса</span>

            <button
                tuiButton
                tuiChevron
                class="project-main-settings__select"
                type="button"
                appearance="outline"
                size="m"
            >
                Разработка
            </button>
        </label>

        <label class="project-main-settings__field">
            <span class="project-main-settings__label">Дата старта</span>

            <tui-textfield tuiTextfieldSize="m" iconStart="@tui.calendar">
                <input tuiInput placeholder="Выберите дату" />
            </tui-textfield>
        </label>

        <label class="project-main-settings__field">
            <span class="project-main-settings__label">Дедлайн</span>

            <tui-textfield tuiTextfieldSize="m" iconStart="@tui.calendar">
                <input tuiInput placeholder="Выберите дату" />
            </tui-textfield>
        </label>
    </main>

    <footer class="project-main-settings__footer">
        <button tuiButton type="button" appearance="primary" size="m">
            Сохранить изменения
        </button>

        <button tuiButton type="button" appearance="outline" size="m">
            Отмена
        </button>
    </footer>
</div>
