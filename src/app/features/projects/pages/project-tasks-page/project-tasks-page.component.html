<div class="project-tasks-page__wrapper">
    @if (project(); as project) {
        <app-project-task-create
            [project]="project"
            [tasks]="tasks()"
            (taskCreated)="addTask($event)"
        />
        <app-project-task-toolbar
            [tasks]="tasks()"
            [project]="project"
            (stageSelected)="selectStage($event)"
        />
        <app-project-task-list [tasks]="filteredTasks()" />
    }
</div>
