<div class="not-found-page">
    <button
        tuiButton
        class="not-found-page__back-button"
        appearance="flat"
        size="m"
        iconStart="@tui.arrow-left"
        (click)="goBack()"
    >
        Вернуться назад
    </button>

    <div class="not-found-page__image-wrapper">
        <img
            class="not-found-page__image"
            src="/images/404-page-img.png"
            alt="Страница не найдена"
        />
    </div>
</div>
