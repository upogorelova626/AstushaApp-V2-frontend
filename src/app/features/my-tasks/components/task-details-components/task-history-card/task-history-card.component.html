<div class="task-history-card">
    <header class="task-history-card__header">
        <div class="task-history-card__title-wrapper">
            <h3 class="task-history-card__title">История</h3>
        </div>

        <button
            tuiButton
            type="button"
            appearance="flat"
            size="s"
            class="task-history-card__show-all"
        >
            Показать все
        </button>
    </header>

    <main class="task-history-card__list">
        <div class="task-history-card__item">
            <div tuiAvatar="@tui.user" class="task-history-card__avatar"></div>

            <div class="task-history-card__content">
                <div class="task-history-card__text">
                    <span class="task-history-card__author">
                        Астюша Котикович
                    </span>

                    <span class="task-history-card__action">
                        изменил статус
                    </span>

                    <span class="task-history-card__badge"> В работе </span>
                </div>

                <span class="task-history-card__time">2 часа назад</span>
            </div>
        </div>

        <div class="task-history-card__item">
            <div tuiAvatar="@tui.user" class="task-history-card__avatar"></div>

            <div class="task-history-card__content">
                <div class="task-history-card__text">
                    <span class="task-history-card__author">
                        Маша Иванова
                    </span>

                    <span class="task-history-card__action">
                        добавила файл
                    </span>
                </div>

                <span class="task-history-card__description">
                    Скриншот текущей версии.png
                </span>

                <span class="task-history-card__time">3 часа назад</span>
            </div>
        </div>

        <div class="task-history-card__item">
            <div tuiAvatar="@tui.user" class="task-history-card__avatar"></div>

            <div class="task-history-card__content">
                <div class="task-history-card__text">
                    <span class="task-history-card__author"> Петя Петров </span>

                    <span class="task-history-card__action">
                        изменил срок
                    </span>
                </div>

                <span class="task-history-card__description">
                    с 15 мая на 20 мая
                </span>

                <span class="task-history-card__time">вчера в 15:42</span>
            </div>
        </div>

        <div class="task-history-card__item">
            <div tuiAvatar="@tui.user" class="task-history-card__avatar"></div>

            <div class="task-history-card__content">
                <div class="task-history-card__text">
                    <span class="task-history-card__author">
                        Коля Сидоров
                    </span>

                    <span class="task-history-card__action">
                        добавил подзадачу
                    </span>
                </div>

                <span class="task-history-card__description">
                    Реализовать вход через Apple
                </span>

                <span class="task-history-card__time">16 мая в 10:11</span>
            </div>
        </div>
    </main>
</div>
