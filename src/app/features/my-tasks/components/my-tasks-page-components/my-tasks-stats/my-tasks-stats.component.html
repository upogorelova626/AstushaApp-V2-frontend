<div class="wrapper">
    @for (item of cards(); track $index) {
        <div class="card">
            <div [tuiAvatar]="item.icon" size="l" appearance="info"></div>

            <div class="content">
                <div class="title">{{ item.label }}</div>

                <div class="value" [tuiSkeleton]="isLoading()">
                    {{ item.value }}</div
                >
            </div>
        </div>
    }
</div>
