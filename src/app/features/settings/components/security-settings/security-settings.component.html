<div class="security-card">
    <div class="security-card__header">
        <div class="security-card__icon">
            <tui-icon icon="@tui.shield-check" />
        </div>

        <div class="security-card__header-text">
            <h2 class="security-card__title">Безопасность</h2>

            <p class="security-card__description">
                Управление паролями и двухфакторной защитой
            </p>
        </div>
    </div>

    <div class="security-card__list">
        <div class="security-card__item">
            <div class="security-card__item-info">
                <div class="security-card__item-icon">
                    <tui-icon icon="@tui.lock-keyhole" />
                </div>

                <div>
                    <h3 class="security-card__item-title">Пароль</h3>

                    <p class="security-card__item-description">
                        Измените пароль для входа в аккаунт
                    </p>
                </div>
            </div>

            <button
                tuiButton
                type="button"
                appearance="flat"
                size="s"
                iconEnd="@tui.chevron-right"
                (click)="openChangePasswordDialog()"
            >
                Изменить пароль
            </button>
        </div>

        <div class="security-card__item">
            <div class="security-card__item-info">
                <div class="security-card__item-icon">
                    <tui-icon icon="@tui.badge-check" />
                </div>

                <div>
                    <h3 class="security-card__item-title">
                        Двухфакторная аутентификация
                    </h3>

                    <p class="security-card__item-description">
                        Добавьте дополнительную защиту аккаунта
                    </p>
                </div>
            </div>

            <button
                tuiButton
                type="button"
                appearance="flat"
                size="s"
                iconEnd="@tui.chevron-right"
            >
                Включить
            </button>
        </div>
    </div>
</div>
