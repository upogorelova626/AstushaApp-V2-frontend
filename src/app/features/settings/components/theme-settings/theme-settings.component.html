<div class="theme-card">
    <div class="theme-card__header">
        <div class="theme-card__icon">
            <tui-icon icon="@tui.palette" />
        </div>

        <div class="theme-card__header-text">
            <h2 class="theme-card__title">Внешний вид</h2>

            <p class="theme-card__description">
                Настройте внешний вид приложения
            </p>
        </div>
    </div>

    <div class="theme-card__content">
        <div class="theme-card__section">
            <div class="theme-card__section-info">
                <div class="theme-card__section-icon">
                    <tui-icon icon="@tui.paintbrush" />
                </div>

                <div class="theme-card__section-text">
                    <h3 class="theme-card__section-title"> Тема интерфейса </h3>

                    <p class="theme-card__section-description">
                        Выберите, как будет выглядеть AstushaApp
                    </p>
                </div>
            </div>

            <div class="theme-card__actions">
                <button
                    tuiButton
                    appearance="flat"
                    size="s"
                    iconStart="@tui.sun"
                    (click)="changeTheme('light')"
                >
                    Светлая
                </button>

                <button
                    tuiButton
                    size="s"
                    iconStart="@tui.moon"
                    (click)="changeTheme('dark')"
                >
                    Тёмная
                </button>

                <button
                    tuiButton
                    appearance="flat"
                    size="s"
                    iconStart="@tui.monitor"
                    (click)="changeTheme('funny')"
                >
                    Системная
                </button>
            </div>
        </div>

        <div class="theme-card__section">
            <div class="theme-card__section-info">
                <div class="theme-card__section-icon">
                    <tui-icon icon="@tui.languages" />
                </div>

                <div class="theme-card__section-text">
                    <h3 class="theme-card__section-title"> Язык интерфейса </h3>

                    <p class="theme-card__section-description">
                        Сейчас используется русский язык
                    </p>
                </div>
            </div>

            <button
                tuiButton
                appearance="flat"
                size="s"
                iconEnd="@tui.chevron-down"
                tuiHint="В данный момент доступен только русский язык. Следите за обновлениями"
            >
                Русский
            </button>
        </div>
    </div>
</div>
