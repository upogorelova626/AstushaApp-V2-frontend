<div class="notifications-card">
    <div class="notifications-card__header">
        <div class="notifications-card__icon">
            <tui-icon icon="@tui.bell" />
        </div>

        <div class="notifications-card__header-text">
            <h2 class="notifications-card__title">Уведомления</h2>

            <p class="notifications-card__description">
                Настройка уведомлений и оповещений
            </p>
        </div>
    </div>

    <div class="notifications-card__list">
        <label class="notifications-card__item">
            <div class="notifications-card__item-text">
                <span class="notifications-card__item-title">
                    Email-уведомления
                </span>

                <span class="notifications-card__item-description">
                    Получать важные уведомления на почту
                </span>
            </div>

            <input tuiSwitch type="checkbox" checked />
        </label>

        <label class="notifications-card__item">
            <div class="notifications-card__item-text">
                <span class="notifications-card__item-title">
                    Push-уведомления
                </span>

                <span class="notifications-card__item-description">
                    Получать уведомления в браузере
                </span>
            </div>

            <input tuiSwitch type="checkbox" checked />
        </label>
    </div>
</div>
