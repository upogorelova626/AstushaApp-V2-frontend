<section class="profile-card">
    <header class="profile-card__header">
        <div class="profile-card__header-left">
            <div tuiAvatar="@tui.user" class="profile-card__icon"></div>

            <div class="profile-card__header-text">
                <h2 class="profile-card__title">
                    Профиль и личная информация
                </h2>

                <p class="profile-card__description">
                    Эти данные используются в экосистеме Astusha и управляются
                    через Astusha ID.
                </p>
            </div>
        </div>
    </header>

    <main class="profile-card__content">
        <aside class="profile-card__avatar-section">
            <div
                class="profile-card__avatar"
                [tuiSkeleton]="isProfileLoading()"
            >
                @if (me()?.avatarUrl) {
                    <img
                        class="profile-card__avatar-image"
                        [src]="me()?.avatarUrl"
                        alt="Аватар профиля"
                    />
                } @else {
                    <div
                        tuiAvatar="@tui.user"
                        class="profile-card__avatar-fallback"
                    ></div>
                }
            </div>
        </aside>

        <div class="profile-card__info">
            <div class="profile-card__row">
                <div class="profile-card__field">
                    <label tuiLabel>Имя</label>

                    <tui-textfield
                        class="profile-card__input"
                        [tuiSkeleton]="isProfileLoading()"
                    >
                        <input
                            tuiInput
                            disabled
                            [value]="me()?.firstName || 'Не указано'"
                        />
                    </tui-textfield>
                </div>

                <div class="profile-card__field">
                    <label tuiLabel>Фамилия</label>

                    <tui-textfield
                        class="profile-card__input"
                        [tuiSkeleton]="isProfileLoading()"
                    >
                        <input
                            tuiInput
                            disabled
                            [value]="me()?.lastName || 'Не указано'"
                        />
                    </tui-textfield>
                </div>
            </div>

            <div class="profile-card__field">
                <label tuiLabel>Email</label>

                <tui-textfield
                    class="profile-card__input"
                    [tuiSkeleton]="isProfileLoading()"
                >
                    <input
                        tuiInput
                        disabled
                        [value]="me()?.email || 'Не указано'"
                    />
                </tui-textfield>
            </div>

            <div class="profile-card__field">
                <label tuiLabel>Должность</label>

                <tui-textfield
                    class="profile-card__input"
                    [tuiSkeleton]="isProfileLoading()"
                >
                    <input
                        tuiInput
                        disabled
                        [value]="me()?.position || 'Не указано'"
                    />
                </tui-textfield>
            </div>

            <div class="profile-card__field">
                <label tuiLabel>О себе</label>

                <tui-textfield
                    class="profile-card__textarea"
                    [tuiSkeleton]="isProfileLoading()"
                >
                    <textarea
                        tuiTextarea
                        disabled
                        [value]="me()?.about || 'Не указано'"
                    ></textarea>
                </tui-textfield>
            </div>

            <div class="profile-card__actions">
                <button
                    tuiButton
                    type="button"
                    class="profile-card__action"
                    appearance="flat"
                    size="m"
                    iconEnd="@tui.chevron-right"
                    (click)="openAstushaIdProfileSettings()"
                >
                    Редактировать в Astusha ID
                </button>
            </div>
        </div>
    </main>
</section>
