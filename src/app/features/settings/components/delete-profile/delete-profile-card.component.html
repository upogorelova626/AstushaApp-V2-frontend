<div class="delete-profile">
    <div class="delete-profile__header">
        <div class="delete-profile__icon">
            <tui-icon icon="@tui.trash-2" />
        </div>

        <div class="delete-profile__header-text">
            <h2 class="delete-profile__title">Удаление аккаунта</h2>

            <p class="delete-profile__description">
                Аккаунт управляется через Astusha ID
            </p>
        </div>
    </div>

    <div class="delete-profile__content">
        <div class="delete-profile__warning">
            <p class="delete-profile__warning-title">
                Удаление затронет всю экосистему Astusha
            </p>

            <p class="delete-profile__warning-text">
                Если удалить аккаунт в Astusha ID, доступ к AstushaApp и другим
                сервисам Astusha будет прекращён. Данные аккаунта нельзя будет
                восстановить.
            </p>
        </div>

        <button
            tuiButton
            class="delete-profile__button"
            appearance="negative"
            size="m"
            iconEnd="@tui.chevron-right"
            (click)="openAstushaIdSecuritySettings()"
        >
            Перейти в Astusha ID
        </button>
    </div>
</div>
