<div class="team-invite-member-card">
    <header class="team-invite-member-card__header">
        <div>
            <h2 class="team-invite-member-card__title">
                Пригласить участника
            </h2>

            <p class="team-invite-member-card__description">
                Добавьте человека в команду по email или логину.
            </p>
        </div>

        <div class="team-invite-member-card__icon">
            <tui-icon icon="@tui.user-plus" />
        </div>
    </header>

    <form class="team-invite-member-card__form">
        <label class="team-invite-member-card__field">
            <span class="team-invite-member-card__label">
                Email или логин
            </span>

            <div class="team-invite-member-card__search-row">
                <tui-textfield
                    class="team-invite-member-card__search-input"
                    tuiTextfieldSize="m"
                    iconStart="@tui.mail"
                >
                    <input
                        tuiInput
                        type="text"
                        placeholder="example@astusha.com"
                        [formControl]="lookupForm"
                        (input)="resetFoundUser()"
                    />
                </tui-textfield>

                <button
                    tuiButton
                    class="team-invite-member-card__search-button"
                    type="button"
                    appearance="outline"
                    size="m"
                    iconStart="@tui.search"
                    [disabled]="isSearching()"
                    (click)="searchUser()"
                >
                    {{ isSearching() ? 'Ищем...' : 'Найти' }}
                </button>
            </div>

            <tui-error
                [formControl]="lookupForm"
                [order]="[
                    'required',
                    'notBlank',
                    'minlength',
                    'maxlength',
                    'spacesNotAllowed'
                ]"
            />

            <tui-error [error]="lookupError()" />

            @if (foundUser(); as user) {
                <div class="team-invite-member-card__found-user">
                    <div class="team-invite-member-card__found-user-icon">
                        <tui-icon icon="@tui.check" />
                    </div>

                    <div class="team-invite-member-card__found-user-content">
                        <span class="team-invite-member-card__found-user-title">
                            Пользователь найден
                        </span>

                        <span class="team-invite-member-card__found-user-meta">
                            {{ user.login }} · {{ user.email }}
                        </span>
                    </div>
                </div>
            }
        </label>

        <label class="team-invite-member-card__field">
            <span class="team-invite-member-card__label"> Роль в команде </span>

            <button
                tuiButton
                tuiChevron
                class="team-invite-member-card__select"
                type="button"
                appearance="outline"
                size="m"
                [attr.aria-expanded]="open()"
                [tuiDropdown]="dropdownContent"
                [tuiDropdownManual]="open()"
                [tuiObscuredEnabled]="open()"
                (click)="onClick()"
                (tuiActiveZoneChange)="onActiveZone($event)"
                (tuiObscured)="onObscured($event)"
            >
                {{ buttonLabel() }}
            </button>

            <tui-error [error]="roleError()" />
        </label>

        <label class="team-invite-member-card__field">
            <span class="team-invite-member-card__label"> Сообщение </span>

            <tui-textfield tuiTextfieldSize="m">
                <textarea
                    tuiTextarea
                    placeholder="Напишите короткое сообщение для приглашения"
                    [formControl]="messageControl"
                ></textarea>
            </tui-textfield>

            <tui-error [formControl]="messageControl" [order]="['maxlength']" />
        </label>

        <footer class="team-invite-member-card__footer">
            <button
                tuiButton
                type="button"
                appearance="outline"
                size="m"
                (click)="clearForm()"
            >
                Очистить
            </button>

            <button
                tuiButton
                type="button"
                appearance="primary"
                size="m"
                iconStart="@tui.send"
                [disabled]="!foundUser() || !selected() || isSubmitting()"
                (click)="addMember()"
            >
                {{ isSubmitting() ? 'Добавляем...' : 'Добавить участника' }}
            </button>
        </footer>
    </form>

    <ng-template #dropdownContent>
        <tui-data-list>
            @for (role of roles; track role.title) {
                <button tuiOption type="button" (click)="onSelect(role)">
                    <span tuiTitle>
                        {{ role.title }}

                        <span tuiSubtitle>
                            {{ role.description }}
                        </span>
                    </span>
                </button>
            }
        </tui-data-list>
    </ng-template>
</div>
