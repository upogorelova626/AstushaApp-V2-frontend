<div class="card">
    <header class="header">
        <h2 class="title">Информация о команде</h2>

        <button
            tuiButton
            class="edit-button"
            type="button"
            appearance="flat"
            size="s"
            iconStart="@tui.pencil"
            (click)="startEditing()"
        >
            Редактировать
        </button>
    </header>

    <div class="content">
        <div class="avatar-wrapper">
            <div class="avatar" [tuiSkeleton]="isLoading()">AI</div>

            <button
                tuiButton
                class="avatar-button"
                type="button"
                appearance="flat"
                size="s"
                iconStart="@tui.camera"
            >
                Изменить аватар
            </button>
        </div>

        <form class="form" [formGroup]="form">
            <label class="field">
                <span class="label">Название команды</span>

                <tui-textfield tuiTextfieldSize="m" [tuiSkeleton]="isLoading()">
                    <input
                        tuiInput
                        type="text"
                        formControlName="name"
                        placeholder="Введите название команды"
                    />
                </tui-textfield>
            </label>

            <label class="field">
                <span class="label">Описание</span>

                <tui-textfield tuiTextfieldSize="m" [tuiSkeleton]="isLoading()">
                    <textarea
                        tuiTextarea
                        formControlName="description"
                        placeholder="Расскажите, чем занимается команда"
                    ></textarea>
                </tui-textfield>
            </label>

            <footer class="footer">
                <button
                    tuiButton
                    type="button"
                    size="m"
                    [disabled]="form.invalid"
                    (click)="saveTeam()"
                >
                    Сохранить изменения
                </button>

                <button
                    tuiButton
                    type="button"
                    appearance="flat"
                    size="m"
                    (click)="cancelEditing()"
                >
                    Отменить
                </button>
            </footer>
        </form>
    </div>
</div>
