<section class="team-roles-settings-card">
    <header class="team-roles-settings-card__header">
        <h2 class="team-roles-settings-card__title">Роли и права</h2>

        <p class="team-roles-settings-card__description">
            Настройте роли и права доступа в команде
        </p>
    </header>

    <div class="team-roles-settings-card__list">
        <button
            tuiButton
            type="button"
            appearance="flat"
            class="team-roles-settings-card__item"
        >
            <div class="team-roles-settings-card__item-info">
                <span class="team-roles-settings-card__role-name">
                    Создатель
                </span>

                <span class="team-roles-settings-card__role-description">
                    Полный доступ ко всем настройкам
                </span>
            </div>

            <div class="team-roles-settings-card__item-action">
                <span class="team-roles-settings-card__count">1</span>

                <tui-icon
                    class="team-roles-settings-card__chevron"
                    icon="@tui.chevron-right"
                />
            </div>
        </button>

        <button
            tuiButton
            type="button"
            appearance="flat"
            class="team-roles-settings-card__item"
        >
            <div class="team-roles-settings-card__item-info">
                <span class="team-roles-settings-card__role-name">
                    Администратор
                </span>

                <span class="team-roles-settings-card__role-description">
                    Управление участниками и проектами
                </span>
            </div>

            <div class="team-roles-settings-card__item-action">
                <span class="team-roles-settings-card__count">2</span>

                <tui-icon
                    class="team-roles-settings-card__chevron"
                    icon="@tui.chevron-right"
                />
            </div>
        </button>

        <button
            tuiButton
            type="button"
            appearance="flat"
            class="team-roles-settings-card__item"
        >
            <div class="team-roles-settings-card__item-info">
                <span class="team-roles-settings-card__role-name">
                    Владелец проектов
                </span>

                <span class="team-roles-settings-card__role-description">
                    Управление проектами команды
                </span>
            </div>

            <div class="team-roles-settings-card__item-action">
                <span class="team-roles-settings-card__count">2</span>

                <tui-icon
                    class="team-roles-settings-card__chevron"
                    icon="@tui.chevron-right"
                />
            </div>
        </button>

        <button
            tuiButton
            type="button"
            appearance="flat"
            class="team-roles-settings-card__item"
        >
            <div class="team-roles-settings-card__item-info">
                <span class="team-roles-settings-card__role-name">
                    Участник
                </span>

                <span class="team-roles-settings-card__role-description">
                    Доступ к проектам команды
                </span>
            </div>

            <div class="team-roles-settings-card__item-action">
                <span class="team-roles-settings-card__count">7</span>

                <tui-icon
                    class="team-roles-settings-card__chevron"
                    icon="@tui.chevron-right"
                />
            </div>
        </button>
    </div>

    <footer class="team-roles-settings-card__footer">
        <button
            tuiButton
            type="button"
            appearance="flat"
            size="s"
            iconEnd="@tui.chevron-right"
        >
            Настроить роли и права
        </button>
    </footer>
</section>
